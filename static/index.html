<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>TradeBot UI</title>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="styles.css">
</head>
<body>
 <!--main container-->
 <div class="glass-box">
  <h1>TradeBot</h1>
  <p>Binance Testnet Executor</p>
  <form id="orderForm">
   <div class="input-grp">
    <label>Symbol</label>
    <input type="text" id="symbol" value="BTCUSDT" required>
   </div>
   <div class="input-grp">
    <label>Side</label>
    <select id="side">
     <option value="BUY">Buy</option>
     <option value="SELL">Sell</option>
    </select>
   </div>
   <div class="input-grp">
    <label>Type</label>
    <select id="type">
     <option value="MARKET">Market</option>
     <option value="LIMIT">Limit</option>
     <option value="STOP_LIMIT">Stop Limit</option>
     <option value="OCO">OCO</option>
     <option value="TWAP">TWAP</option>
     <option value="GRID">Grid</option>
    </select>
   </div>
   <div class="input-grp">
    <label>Quantity</label>
    <input type="number" id="qty" step="0.001" value="0.005" required>
   </div>
   <div class="input-grp" id="price-group" style="display:none;">
    <label>Price</label>
    <input type="number" id="price" step="0.01">
   </div>
   <div class="input-grp" id="stop-group" style="display:none;">
    <label>Stop Price</label>
    <input type="number" id="stop" step="0.01">
   </div>
   <button type="submit" id="submitBtn">Submit Order</button>
  </form>
  <div id="result" class="hidden"></div>
 </div>
 <script src="script.js"></script>
</body>
</html>
